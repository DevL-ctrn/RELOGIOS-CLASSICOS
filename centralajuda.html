<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos | Central de Ajuda</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #fff; line-height: 1.6; }
        .top-banner { background: #0a2a3b; color: #f0ede8; font-size: 0.75rem; padding: 0.5rem 0; text-align: center; }
        .main-header { background: #fff; border-bottom: 1px solid #eaeef2; position: sticky; top: 0; z-index: 1000; }
        .header-container, .footer-container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
        .header-row { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 0; gap: 2rem; flex-wrap: wrap; }
        .logo { font-size: 1.8rem; font-weight: 800; text-decoration: none; color: #0f2c3d; display: flex; align-items: center; gap: 8px; }
        .logo i, .logo span { color: #c5a257; }
        .search-wrapper { flex: 1; max-width: 480px; }
        .search-box { display: flex; background: #f5f7fa; border-radius: 60px; border: 1px solid #e2e8f0; }
        .search-box input { flex: 1; background: transparent; border: none; padding: 0.8rem 1.2rem; outline: none; }
        .search-box button { background: transparent; border: none; padding: 0 1.2rem; cursor: pointer; }
        .header-icons { display: flex; gap: 1.5rem; align-items: center; }
        .icon-item { color: #2d3e50; font-size: 1.2rem; text-decoration: none; }
        .nav-row { border-top: 1px solid #f0f2f5; }
        .nav-menu { display: flex; justify-content: center; gap: 2rem; padding: 0.8rem 0; list-style: none; flex-wrap: wrap; }
        .nav-menu li a { text-decoration: none; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: #2c3e44; transition: color 0.2s; }
        .nav-menu li a:hover { color: #c5a257; }
        .mobile-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 992px) { .search-wrapper { order: 3; max-width: 100%; } .nav-menu { display: none; flex-direction: column; } .nav-menu.show { display: flex; } .mobile-toggle { display: block; } }
        .container-custom { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
        .page-header { background: #f5f7fa; padding: 2rem 0; margin-bottom: 2rem; }
        .page-header h1 { font-size: 2.5rem; font-weight: 800; color: #0f2c3d; }
        .faq-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; margin: 2rem 0; }
        .faq-item { background: #fff; border-radius: 20px; border: 1px solid #eef2f8; padding: 1.5rem; }
        .faq-item h3 { font-weight: 800; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 10px; }
        .faq-item h3 i { color: #c5a257; }
        .faq-item p { color: #4b5565; font-size: 0.9rem; }
        .contact-card { background: #0f2c3d; border-radius: 24px; padding: 2rem; text-align: center; color: white; margin-top: 2rem; }
        .contact-card h3 { margin-bottom: 0.5rem; }
        .contact-card a { color: #c5a257; text-decoration: none; font-weight: 700; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; background: #0f2c3d; color: white; padding: 0.6rem 1.5rem; border-radius: 40px; text-decoration: none; font-weight: 600; margin-bottom: 1rem; transition: 0.2s; }
        .btn-back:hover { background: #c5a257; color: #0f2c3d; }
        .footer-premium { background: #0a121c; color: #a0a8b5; padding: 3rem 0 1.5rem; margin-top: 2rem; }
        .footer-main-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; gap: 2.5rem; margin-bottom: 2.5rem; }
        .footer-logo { font-size: 1.6rem; font-weight: 800; color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .footer-logo i, .footer-logo span { color: #c5a257; }
        .footer-col h4 { color: #fff; font-weight: 700; font-size: 1rem; margin-bottom: 1.2rem; position: relative; display: inline-block; }
        .footer-col h4:after { content: ''; position: absolute; bottom: -6px; left: 0; width: 35px; height: 2px; background: #c5a257; }
        .footer-col ul { list-style: none; }
        .footer-col li { margin-bottom: 0.7rem; }
        .footer-col a { color: #a0a8b5; text-decoration: none; font-size: 0.8rem; transition: 0.2s; }
